<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libra Zodiac Sign</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        .dates {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .symbol {
            font-size: 60px;
            margin: 20px 0;
        }
        p {
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>♎ Libra</h1>
        <p class="dates">September 23 - October 22</p>
        <div class="symbol">⚖️</div>
        <p>Libra is an air sign known for balance, harmony, and diplomacy. People born under this sign are thoughtful, fair-minded, and value relationships.</p>
        <p><strong>Element:</strong> Air</p>
        <p><strong>Ruling Planet:</strong> Venus</p>
    </div>
</body>
</html>
