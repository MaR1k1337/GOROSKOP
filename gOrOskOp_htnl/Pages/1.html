<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Овен - Гороскоп</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a1a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Туманности */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }
        .nebula-1 { width: 600px; height: 600px; top: -10%; left: -10%; background: #ff6b35; }
        .nebula-2 { width: 400px; height: 400px; bottom: -10%; right: -5%; background: #00d4ff; }
        .nebula-3 { width: 500px; height: 500px; top: 40%; right: 20%; background: #ff2d55; }

        /* Звезды */
        #starfield { position: absolute; inset: 0; z-index: 1; }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: var(--o1); transform: scale(1); }
            100% { opacity: var(--o2); transform: scale(var(--s)); }
        }

        /* Темная стеклянная карточка */
        .card {
            background: rgba(18, 18, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #2a2a55;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        /* Стили картинки */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            object-fit: cover;
            max-height: 300px;
            border: 1px solid #2a2a55;
        }

        /* Текст */
        .card h1 { color: #e0e0f0; margin: 0 0 10px 0; font-size: 2em; }
        .card h3 { color: #00d4ff; margin: 0 0 20px 0; font-weight: normal; font-size: 1.1em;}
        .card p { color: #9090b0; line-height: 1.6; margin-bottom: 30px; font-size: 1.05em; }

        /* Кнопка назад */
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: rgba(30, 30, 58, 0.6);
            border: 1px solid #2a2a55;
            color: #e0e0f0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: #00d4ff;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- Фон -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>
    <div id="starfield"></div>

    <!-- Карточка со знаком -->
    <div class="card">
        
        <!-- ======================================= -->
        
        
        <img src="..\img\post_5d1eeca37c95f.jpeg" alt="Овен">
        <h1>♈ Овен</h1>
        <h3>21 марта – 19 апреля</h3>
        <p>Энергичные, смелые и независимые первооткрыватели. Овны всегда готовы к действию и любят быть лидерами во всем.</p>
        
        <!-- ======================================= -->

        <a href="../index.html" class="back-btn">← Назад к списку</a>
    </div>

    <!-- Скрипт звезд -->
    <script>
        const sf = document.getElementById('starfield');
        const count = 200; 
        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--dur', (Math.random() * 4 + 2) + 's');
            star.style.setProperty('--o1', (Math.random() * 0.3 + 0.1).toFixed(2));
            star.style.setProperty('--o2', (Math.random() * 0.5 + 0.5).toFixed(2));
            star.style.setProperty('--s', (Math.random() * 0.5 + 1).toFixed(2));
            star.style.animationDelay = (Math.random() * 4) + 's';
            sf.appendChild(star);
        }
    </script>
</body>
</html>
