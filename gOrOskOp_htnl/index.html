<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гороскоп - Выберите знак зодиака</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .grid a {
            display: block;
            padding: 12px;
            background: #f4f4f9;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }
        .grid a:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Выберите свой знак</h1>
        <p>Узнайте, что говорят звезды о вашем характере.</p>
        <div class="grid">
            <a href="1.html">♈ Овен</a>
            <a href="2.html">♉ Телец</a>
            <a href="3.html">♊ Близнецы</a>
            <a href="4.html">♋ Рак</a>
            <a href="5.html">♌ Лев</a>
            <a href="6.html">♍ Дева</a>
            <a href="7.html">♎ Весы</a>
            <a href="8.html">♏ Скорпион</a>
            <a href="9.html">♐ Стрелец</a>
            <a href="10.html">♑ Козерог</a>
            <a href="11.html">♒ Водолей</a>
            <a href="12.html">♓ Рыбы</a>
        </div>
    </div>
</body>
</html>
